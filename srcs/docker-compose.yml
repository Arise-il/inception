services:
    nginx:
        image: nginx:v1.0
        build: ./requirements/nginx
        container_name: nginx
        restart: always
        env_file: .env
        depends_on:
            - mariadb
            - wordpress
        networks:
            - inception_network
        volumes:
            - wp_files:/var/www/html:ro
        ports:
            - "443:443"
    mariadb:
        image: mariadb:v1.0
        build: ./requirements/mariadb
        container_name: mariadb
        restart: always
        env_file: .env
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - inception_network

    wordpress:
        image: wordpress:v1.0
        build: ./requirements/wordpress
        container_name: wordpress
        depends_on:
            - mariadb
        restart: always
        env_file:
            - .env
        networks:
            - inception_network
        volumes:
            - wp_files:/var/www/html

networks:
    inception_network:
        name: inception_network
        driver: bridge

volumes:
    db_data:
        name: db_data
        driver_opts:
            type: none
            device: /home/iel-ghou/data/mariadb
            o: bind
    wp_files:
        name: wp_files
        driver_opts:
            type: none
            device: /home/iel-ghou/data/wordpress
            o: bind